model:
  name: xgboost_match_outcome
  class: models.gradient_boosting.XGBoostModel

hyperparameters:
  n_estimators: 800
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 5
  reg_alpha: 0.1
  reg_lambda: 1.0

data:
  feature_version: "v1.0"
  target_column: match_result
  leagues: [premier_league, la_liga, serie_a, bundesliga, ligue_1]
  train_seasons: ["2021-22", "2022-23", "2023-24"]
  val_season: "2024-25"
  test_season: "2025-26"
  exclude_features:
    - closing_implied_prob_home
