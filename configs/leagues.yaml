# Dynamic League Configuration
# 
# This file defines which leagues the system should process.
# Use LEAGUE_ALLOWLIST and LEAGUE_BLOCKLIST env vars to override these settings.
#
# If neither LEAGUE_ALLOWLIST nor LEAGUE_BLOCKLIST is set, all configured
# leagues will be processed.
#
# Format:
#   league_id: Unique identifier (used in DB and API)
#   display_name: Human-readable name for UI
#   enabled: Whether to process this league by default
#   provider_league_ids: Mapping from provider-specific IDs to this league
#   sport: Sport type (football, basketball, etc.)

leagues:
  premier_league:
    display_name: Premier League
    enabled: true
    sport: football
    provider_league_ids:
      api_sports: 39
      sportsdataio: 4
      the_sports_db: 4328
    country: England
  
  la_liga:
    display_name: La Liga
    enabled: true
    sport: football
    provider_league_ids:
