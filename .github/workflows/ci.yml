name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Lint Python
        run: |
          uv pip install ruff
          ruff check libs/ services/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - "5432:5432"
      redis:
        image: redis:7
        ports:
          - "6379:6379"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install pytest pytest-cov pytest-asyncio httpx numpy pandas pyyaml redis scikit-learn fastapi structlog sqlalchemy asyncpg pydantic pydantic-settings kafka-python
          cd libs && uv pip install -e ".[dev]" && cd ..

      - name: Run backend tests
        run: |
          pytest libs/tests/ services/biometric_service/tests/ services/feature_engine/tests/ services/model_training/tests/ services/nlp_service/tests/ -v --cov=sports_common --cov-report=xml:coverage.xml
          pushd services/model_serving
          pytest tests/ -q
          popd
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          API_KEY: ci-api-key

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mypy
        run: pip install mypy types-requests

      - name: Type check
        run: mypy libs/sports_common --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install bandit safety

      - name: Run Bandit security scan
        run: bandit -r libs/ services/ -f json -o bandit-report.json

      - name: Check for secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --report-type json > secrets-report.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("secrets-report.json").read_text())
          results = report.get("results", {})
          leaked = sum(len(v) for v in results.values())
          if leaked:
              raise SystemExit(f"detect-secrets found {leaked} potential secrets")
          PY

      - name: Upload security reports
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit-report.json
            secrets-report.json

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm run audit:ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Type check frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Test frontend
        working-directory: frontend
        run: npm test -- --coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  data-leakage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install uv pytest
          cd libs && uv pip install -e ".[dev]" && cd ..

      - name: Run data leakage tests
        run: pytest services/feature_engine/tests/test_data_leakage.py -v

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker-compose up -d

      - name: Wait for services
        run: sleep 30

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run E2E tests
        run: |
          pip install httpx asyncio
          python scripts/e2e_test.py --url http://localhost:8004 --api-key "$API_KEY"
        env:
          API_KEY: ci-api-key

      - name: Cleanup
        if: always()
        run: docker-compose down

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install numpy pandas scikit-learn xgboost sqlalchemy asyncpg pydantic pydantic-settings structlog pyyaml
          cd libs && uv pip install -e . && cd ..

      - name: Run benchmark script
        run: python scripts/benchmark_classical_vs_deep.py

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: model-benchmark-report
          path: reports/model_benchmark_*.md
