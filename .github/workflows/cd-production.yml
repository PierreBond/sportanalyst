name: CD Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (production)
        required: true
        default: production

env:
  REGISTRY: ghcr.io/pierrebond
  NAMESPACE: sports-prediction

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: ingestion
            path: services/ingestion
          - name: feature-engine
            path: services/feature_engine
          - name: model-serving
            path: services/model_serving
          - name: model-training
            path: services/model_training
          - name: nlp-service
            path: services/nlp_service
          - name: biometric-service
            path: services/biometric_service
          - name: reporting-service
            path: services/reporting_service

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA and version tag
        id: meta
        run: |
          echo "short=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.path }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/sports-${{ matrix.service.name }}:sha-${{ steps.meta.outputs.short }}
            ${{ env.REGISTRY }}/sports-${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/sports-${{ matrix.service.name }}:prod
            ${{ env.REGISTRY }}/sports-${{ matrix.service.name }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://sports.example.com
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Apply base manifests
        run: |
          kubectl apply -f infra/k8s/base/namespace.yml
          kubectl apply -f infra/k8s/base/configmap.yml

      - name: Rolling update — deploy services
        run: |
          for svc in ingestion feature-engine model-serving model-training nlp-service biometric-service reporting-service; do
            kubectl apply -f infra/k8s/services/$svc/deployment.yml || true
            kubectl apply -f infra/k8s/services/$svc/service.yml || true
            kubectl apply -f infra/k8s/services/$svc/hpa.yml || true
          done

      - name: Rolling update — image pull
        run: |
          for svc in ingestion feature-engine model-serving model-training nlp-service biometric-service reporting-service; do
            kubectl rollout status deployment/$svc -n ${{ env.NAMESPACE }} --timeout=300s
          done

      - name: Smoke test after deploy
        run: |
          kubectl exec -n ${{ env.NAMESPACE }} deployment/ingestion -- /bin/sh -c "curl -s http://localhost:8001/health/ready" || true
          kubectl exec -n ${{ env.NAMESPACE }} deployment/model-serving -- /bin/sh -c "curl -s http://localhost:8004/health" || true
