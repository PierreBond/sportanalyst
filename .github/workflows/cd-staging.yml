name: CD Staging

on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io/pierrebond
  NAMESPACE: sports-prediction

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: ingestion
            path: services/ingestion
          - name: feature-engine
            path: services/feature_engine
          - name: model-serving
            path: services/model_serving
          - name: model-training
            path: services/model_training
          - name: nlp-service
            path: services/nlp_service
          - name: biometric-service
            path: services/biometric_service
          - name: reporting-service
            path: services/reporting_service

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.path }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/sports-${{ matrix.service.name }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/sports-${{ matrix.service.name }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Apply base manifests
        run: |
          kubectl apply -f infra/k8s/base/namespace.yml
          kubectl apply -f infra/k8s/base/configmap.yml

      - name: Deploy services
        run: |
          for svc in ingestion feature-engine model-serving model-training nlp-service biometric-service reporting-service; do
            kubectl apply -f infra/k8s/services/$svc/deployment.yml
            if [ -f infra/k8s/services/$svc/service.yml ]; then kubectl apply -f infra/k8s/services/$svc/service.yml; fi
            if [ -f infra/k8s/services/$svc/hpa.yml ]; then kubectl apply -f infra/k8s/services/$svc/hpa.yml; fi
          done

      - name: Pin deployed images to commit SHA
        id: runtime_sha
        run: |
          short=$(git rev-parse --short ${{ github.sha }})
          echo "short=$short" >> $GITHUB_OUTPUT
          kubectl set image deployment/ingestion ingestion=${{ env.REGISTRY }}/sports-ingestion:sha-$short -n ${{ env.NAMESPACE }}
          kubectl set image deployment/feature-engine feature-engine=${{ env.REGISTRY }}/sports-feature-engine:sha-$short -n ${{ env.NAMESPACE }}
          kubectl set image deployment/model-serving model-serving=${{ env.REGISTRY }}/sports-model-serving:sha-$short -n ${{ env.NAMESPACE }}
          kubectl set image deployment/model-training model-training=${{ env.REGISTRY }}/sports-model-training:sha-$short -n ${{ env.NAMESPACE }}
          kubectl set image deployment/nlp-service nlp-service=${{ env.REGISTRY }}/sports-nlp-service:sha-$short -n ${{ env.NAMESPACE }}
          kubectl set image deployment/biometric-service biometric-service=${{ env.REGISTRY }}/sports-biometric-service:sha-$short -n ${{ env.NAMESPACE }}
          kubectl set image deployment/reporting-service reporting-service=${{ env.REGISTRY }}/sports-reporting-service:sha-$short -n ${{ env.NAMESPACE }}

      - name: Deploy api-gateway
        run: |
          kubectl apply -f infra/k8s/services/api-gateway/configmap.yml
          kubectl apply -f infra/k8s/services/api-gateway/deployment.yml
          kubectl apply -f infra/k8s/services/api-gateway/service.yml
          if [ -f infra/k8s/services/api-gateway/hpa.yml ]; then kubectl apply -f infra/k8s/services/api-gateway/hpa.yml; fi

      - name: Set up kubectl wait
        run: kubectl wait --for=condition=available --timeout=300s deployment/ingestion deployment/feature-engine deployment/model-serving deployment/model-training deployment/nlp-service deployment/biometric-service deployment/reporting-service deployment/api-gateway -n ${{ env.NAMESPACE }}

      - name: Smoke test services
        run: |
          kubectl wait --for=condition=ready pod -l app=ingestion -n ${{ env.NAMESPACE }} --timeout=120s
          kubectl wait --for=condition=ready pod -l app=model-serving -n ${{ env.NAMESPACE }} --timeout=120s
          kubectl port-forward -n ${{ env.NAMESPACE }} svc/model-serving 8004:8004 >/tmp/pf-staging.log 2>&1 &
          PF_PID=$!
          sleep 8
          curl -fsS http://localhost:8004/health
          kill $PF_PID

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run staging integration tests
        run: |
          pip install httpx
          kubectl port-forward -n ${{ env.NAMESPACE }} svc/model-serving 8004:8004 >/tmp/pf-e2e.log 2>&1 &
          PF_PID=$!
          sleep 8
          python scripts/e2e_test.py --url http://localhost:8004
          kill $PF_PID
