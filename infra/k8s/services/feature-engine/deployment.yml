apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-engine
  namespace: sports-prediction
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feature-engine
  template:
    metadata:
      labels:
        app: feature-engine
    spec:
      containers:
        - name: feature-engine
          image: ghcr.io/pierrebond/sports-feature-engine:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: sports-config
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
