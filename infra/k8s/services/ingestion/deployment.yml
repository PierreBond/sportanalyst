apiVersion: v1
kind: Namespace
metadata:
  name: sports-prediction
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sports-config
  namespace: sports-prediction
data:
  DATABASE_URL: "postgresql+asyncpg://postgres:5432/sportspred"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  REDIS_URL: "redis://redis:6379/0"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion
  namespace: sports-prediction
spec:
  selector:
    app: ingestion
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: sports-prediction
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      containers:
        - name: ingestion
          image: sports-ingestion:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: sports-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
