apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-service
  namespace: sports-prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reporting-service
  template:
    metadata:
      labels:
        app: reporting-service
    spec:
      containers:
        - name: reporting-service
          image: ghcr.io/pierrebond/sports-reporting-service:latest
          ports:
            - containerPort: 8005
          envFrom:
            - configMapRef:
                name: sports-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 20
            periodSeconds: 10
