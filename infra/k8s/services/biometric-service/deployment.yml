apiVersion: apps/v1
kind: Deployment
metadata:
  name: biometric-service
  namespace: sports-prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biometric-service
  template:
    metadata:
      labels:
        app: biometric-service
    spec:
      containers:
        - name: biometric-service
          image: ghcr.io/pierrebond/sports-biometric-service:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: sports-config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: sports-api-key
                  key: API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 20
            periodSeconds: 10
