apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlp-service
  namespace: sports-prediction
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nlp-service
  template:
    metadata:
      labels:
        app: nlp-service
    spec:
      containers:
        - name: nlp-service
          image: ghcr.io/pierrebond/sports-nlp-service:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: sports-config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: sports-api-key
                  key: API_KEY
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 15
